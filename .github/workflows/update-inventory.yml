name: 재고 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:        # GitHub Actions 탭에서 수동 실행 가능

jobs:
  update-inventory:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # inventory-data.json 커밋·푸시 권한

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Playwright 브라우저 설치 (Chromium)
        run: npx playwright install chromium --with-deps

      - name: 재고 스크래핑 실행
        env:
          TIKTOK_EMAIL:      ${{ secrets.TIKTOK_EMAIL }}
          TIKTOK_PASSWORD:   ${{ secrets.TIKTOK_PASSWORD }}
          TIKTOK_SELLER_URL: ${{ secrets.TIKTOK_SELLER_URL }}
        run: node scripts/scrape-inventory.js

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inventory-data.json
          git diff --staged --quiet || (
            git commit -m "chore: 재고 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
            git push
          )
